name: release-binary

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Sync dependencies
        run: uv sync --group dev --frozen
      - name: Ruff lint
        run: uv run ruff check iwp_lint iwp_build test
      - name: Ruff format check
        run: uv run ruff format --check iwp_lint iwp_build test
      - name: Pyright
        run: uv run python -m pyright iwp_lint iwp_build test
      - name: Regression tests
        run: uv run python -m unittest iwp_lint.tests.test_regression

  build-binaries:
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - name: Sync dependencies
        run: uv sync --group dev --frozen
      - name: Build iwp-lint binary
        run: uv run pyinstaller --onefile --name iwp-lint-${{ runner.os }} iwp_lint/__main__.py
      - name: Build iwp-build binary
        run: uv run pyinstaller --onefile --name iwp-build-${{ runner.os }} iwp_build/__main__.py
      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: |
            dist/iwp-lint-*
            dist/iwp-build-*

  release:
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: release-binaries
          merge-multiple: true
      - name: Verify release assets
        run: |
          shopt -s nullglob
          files=(release-binaries/*)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found under release-binaries/" >&2
            exit 1
          fi
          echo "Release assets to publish:"
          printf '%s\n' "${files[@]}"
      - name: Bundle archives by platform
        run: |
          set -euo pipefail
          mkdir -p packaged bundle

          for os in Linux macOS Windows; do
            mkdir -p "bundle/${os}"
            shopt -s nullglob
            files=(release-binaries/iwp-lint-${os}* release-binaries/iwp-build-${os}*)
            if [ "${#files[@]}" -eq 0 ]; then
              echo "No binaries found for ${os}" >&2
              exit 1
            fi
            cp "${files[@]}" "bundle/${os}/"
            (cd "bundle/${os}" && zip -r "../../packaged/instructware-tools-${os}.zip" .)
          done

          echo "Packaged archives:"
          ls -l packaged
      - name: Generate checksums and manifest
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          packed_dir = Path("packaged")
          archives = sorted(packed_dir.glob("instructware-tools-*.zip"))
          if not archives:
              raise SystemExit("no packaged archives found")
          checksum_lines = []
          assets = []
          for archive in archives:
              digest = hashlib.sha256(archive.read_bytes()).hexdigest()
              checksum_lines.append(f"{digest}  {archive.name}")
              assets.append(
                  {
                      "file_name": archive.name,
                      "sha256": digest,
                      "size": archive.stat().st_size,
                  }
              )
          (packed_dir / "checksums.sha256").write_text("\n".join(checksum_lines) + "\n", encoding="utf-8")
          manifest = {
              "schema_version": "1.0.0",
              "release_tag": "${{ github.ref_name }}",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "assets": assets,
          }
          (packed_dir / "release-manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            packaged/*.zip
            packaged/checksums.sha256
            packaged/release-manifest.json
          fail_on_unmatched_files: true
          generate_release_notes: true
